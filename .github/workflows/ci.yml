name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  daemon-tests:
    name: Daemon + wrapper tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip pyserial pyte

      - name: Byte-compile daemon + wrapper
        run: python -m py_compile daemon/claude_mate_daemon.py bin/claude-mate-wrap

      - name: Run the test suite
        env:
          # Pin an empty accounts dir so the wrapper's account picker never blocks.
          CLAUDE_MATE_ACCOUNTS_DIR: /nonexistent-claude-mate-accounts
        run: |
          set -e
          for t in tools/test_*.py; do
            echo "::group::$t"
            python "$t" < /dev/null
            echo "::endgroup::"
          done

  firmware-build:
    name: Firmware compile (Arduino Nano)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install AVR core + Adafruit GFX
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install "Adafruit GFX Library"

      - name: Compile firmware sketches
        run: |
          arduino-cli compile --fqbn arduino:avr:nano firmware/claude_mate
          arduino-cli compile --fqbn arduino:avr:nano firmware/selftest
